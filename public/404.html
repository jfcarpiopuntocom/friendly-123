<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AMIGABLE — algo salió mal</title>
<!-- Pagina de error / 404 (Fase 1 del plan de distribucion/soberania, JFC
     2026-07-03). Sirve para dos casos:
     1) GitHub Pages la muestra automaticamente en cualquier URL rota dentro
        de /AMIGABLE/ (convencion estandar de Pages: docs/404.html).
     2) El propio index.html puede redirigir aqui si el auto-update (fases
        futuras: version.json + updater.html) detecta un fallo irrecuperable.
     PROMESA: la app nunca deja al usuario en una pantalla muerta. Siempre
     hay un camino de vuelta: recargar, o escribirle a JFC por WhatsApp.

     REVISION 2026-07-07: repaletizada para calzar con el sistema visual
     vigente de index.html (Sinclair Bloom × Kyoto Muted, aprobado JFC
     2026-07-03 — frio puro, sin beige/cafe). La v1 de esta pagina y de
     manual.html quedaron en la paleta anterior (crema/oro); esta version
     usa las MISMAS variables de color y tipografia que la app real. -->
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#0F1923">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Source+Sans+3:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme: light only;
    forced-color-adjust: none;
    /* mismas variables y valores que index.html (Sinclair Bloom × Kyoto Muted) */
    --blanco-calido:#F8F9FB;
    --azul-oscuro:#0F1923;
    --azul-medio:#2E6278;
    --paper-deep:#E2E8ED;
    --ink:#0F1923;
    --ink-soft:#2C3E50;
    --rust:#E86040;
    --rust-deep:#C05000;
    --brass:#5294AC;
    --verde:#00C87A;
    --font-display:"Space Grotesk","Avenir Next Condensed",sans-serif;
    --font-body:"Source Sans 3","Segoe UI",sans-serif;
    --font-mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100vh;min-height:100svh;}
  body{
    background:#0F1923;
    background:var(--azul-oscuro);
    font-family:var(--font-body);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{
    background:#F8F9FB;
    background:var(--blanco-calido);
    max-width:460px;width:100%;
    border-radius:18px;
    border:2px solid var(--paper-deep);
    padding:34px 26px 28px;text-align:center;
    box-shadow:0 12px 40px rgba(15,25,35,.45);
  }
  .marca{
    font-family:var(--font-display);
    font-size:15px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--brass) !important;-webkit-text-fill-color:var(--brass) !important;
    margin:0 0 10px;
  }
  .codigo{
    font-family:var(--font-mono);font-size:52px;font-weight:700;
    color:var(--rust) !important;-webkit-text-fill-color:var(--rust) !important;
    line-height:1;margin:0 0 14px;
  }
  h1{
    font-family:var(--font-display);
    font-size:22px;font-weight:700;line-height:1.25;
    color:var(--ink) !important;-webkit-text-fill-color:var(--ink) !important;
    margin:0 0 12px;
  }
  p{
    font-size:16px;line-height:1.5;
    color:var(--ink-soft) !important;-webkit-text-fill-color:var(--ink-soft) !important;
    margin:0 0 22px;
  }
  .acciones{display:flex;flex-direction:column;gap:10px;}
  a.btn, button.btn{
    display:block;width:100%;min-height:48px;padding:14px;border-radius:9px;
    font-family:var(--font-display);
    font-size:16px;font-weight:700;text-decoration:none;cursor:pointer;
    border:2px solid transparent;
  }
  .btn-principal{
    background:var(--verde);border-color:#00A868;
    color:var(--blanco-calido) !important;-webkit-text-fill-color:var(--blanco-calido) !important;
  }
  .btn-secundario{
    background:transparent;border-color:var(--azul-medio);
    color:var(--azul-medio) !important;-webkit-text-fill-color:var(--azul-medio) !important;
  }
  .nota{
    font-family:var(--font-mono);font-size:13px;
    color:var(--ink-soft) !important;-webkit-text-fill-color:var(--ink-soft) !important;
    margin-top:20px;
  }
  @media (prefers-color-scheme: dark){
    html,body{ background:#0F1923 !important; }
    .card{background:#F8F9FB !important;border-color:#E2E8ED !important;}
    .marca{color:#5294AC !important;-webkit-text-fill-color:#5294AC !important;}
    .codigo{color:#E86040 !important;-webkit-text-fill-color:#E86040 !important;}
    h1{color:#0F1923 !important;-webkit-text-fill-color:#0F1923 !important;}
    p{color:#2C3E50 !important;-webkit-text-fill-color:#2C3E50 !important;}
    .btn-principal{color:#F8F9FB !important;-webkit-text-fill-color:#F8F9FB !important;}
    .btn-secundario{color:#2E6278 !important;-webkit-text-fill-color:#2E6278 !important;}
    .nota{color:#2C3E50 !important;-webkit-text-fill-color:#2C3E50 !important;}
  }
  @media (prefers-reduced-motion: no-preference){
    .card{animation:subir .3s ease;}
    @keyframes subir{from{transform:translateY(14px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  }
</style>
</head>
<body>
  <div class="card">
    <p class="marca">Amigable</p>
    <div class="codigo">404</div>
    <h1>Esta página no existe o algo se rompió.</h1>
    <p>Tus datos están seguros: viven cifrados en tu propio dispositivo, no en este enlace. Prueba recargar la app o escríbele directo a JFC.</p>
    <div class="acciones">
      <a class="btn btn-principal" href="https://wa.me/593999905080?text=Hola%2C%20tuve%20un%20problema%20con%20AMIGABLE" target="_blank" rel="noopener">Escribir por WhatsApp</a>
      <a class="btn btn-secundario" href="./index.html">Volver a la app</a>
    </div>
    <p class="nota">+593 99 990 5080 · jfcarpio.com</p>
  </div>
</body>
</html>
